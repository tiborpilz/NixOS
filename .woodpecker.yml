variables:
  - &cachix-use |
    set -e
    nix --extra-experimental-features 'nix-command flakes' profile install nixpkgs#cachix
    cachix use tiborpilz
    cachix use nix-community

  - &nix-step
      image: nixos/nix
      environment:
        CACHIX_AUTH_TOKEN:
          from_secret: cachix_auth_token

when:
  - event: push
    branch: main
  - event: pull_request
  - event: manual

steps:
  flake-check:
    <<: *nix-step
    commands:
      - *cachix-use
      # Cursory sanity check: evaluate every flake output (and any
      # import-from-derivation) without building the real derivations.
      - nix --extra-experimental-features 'nix-command flakes' flake check --no-build

  build-doom-emacs-standalone:
    <<: *nix-step
    commands:
      - *cachix-use
      - |
        set -e
        # Push to cachix only on events where the secret is available
        # (push to main, manual runs). Pull requests are build-only: Woodpecker
        # withholds secrets from PR events, so an authtoken/push there would be
        # anonymous and rejected.
        if [ "$CI_PIPELINE_EVENT" = "push" ] || [ "$CI_PIPELINE_EVENT" = "manual" ]; then
          cachix authtoken "$CACHIX_AUTH_TOKEN"
          cachix watch-exec tiborpilz -- nix --extra-experimental-features 'nix-command flakes' build .#doom-emacs-standalone
        else
          echo "Event $CI_PIPELINE_EVENT: building without cachix push."
          nix --extra-experimental-features 'nix-command flakes' build .#doom-emacs-standalone
        fi
