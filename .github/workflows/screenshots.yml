name: 'Screenshots'

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: screenshots-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  terminal:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            download-buffer-size = 524288000
            max-jobs = auto
            cores = 0
            http-connections = 50

      - uses: cachix/cachix-action@v15
        with:
          name: tiborpilz
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Cache Neovim Lazy plugins
        uses: actions/cache@v4
        with:
          path: ~/.local/share/nvim/lazy
          key: nvim-lazy-${{ runner.os }}-${{ hashFiles('home/config/neovim/lazy-lock.json') }}
          restore-keys: |
            nvim-lazy-${{ runner.os }}-

      - name: Install Kitty + Xvfb (system Mesa for working OpenGL)
        run: |
          sudo apt-get update
          sudo apt-get install -y kitty xvfb

      - name: Symlink editor configs
        run: nix develop .#screenshots -c bash screenshots/scripts/setup-ci-configs.sh

      - name: Mock git repo
        run: nix develop .#screenshots -c bash screenshots/scripts/mock-git-repo.sh

      - name: Run terminal scenes
        run: nix develop .#screenshots -c bash screenshots/scripts/run-scenes.sh

      - uses: actions/upload-artifact@v4
        with:
          name: terminal-screenshots
          path: screenshots/output/*.png
          if-no-files-found: error

