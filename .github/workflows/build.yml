name: 'Build Configurations'
on:
  push:
    branches:
      - main
jobs:
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        attr:
          - homeConfigurations.tibor.activationPackage
          - nixosConfigurations.edge.config.system.build.toplevel
          - nixosConfigurations.klaus.config.system.build.toplevel
          - nixosConfigurations.thinkyMcThinkpad.config.system.build.toplevel
    steps:
    - name: Free Disk Space (Ubuntu)
      uses: jlumbroso/free-disk-space@main
    - uses: actions/checkout@v4
    - uses: cachix/install-nix-action@v30
      with:
        nix_path: nixpkgs=channel:nixos-unstable
    - uses: cachix/cachix-action@v15
      with:
        name: tiborpilz
        authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
    - run: nix build '.#${{ matrix.attr }}'
  build-mac:
    runs-on: macos-14
    steps:
    - uses: actions/checkout@v4
    - uses: cachix/install-nix-action@v30
      with:
        nix_path: nixpkgs=channel:nixos-unstable
    - uses: cachix/cachix-action@v15
      with:
        name: tiborpilz
        authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
    - run: nix build '.#homeConfigurations."tiborpilz".activationPackage'
